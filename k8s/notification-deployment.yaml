apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: payment-switch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: notification-api
          image: paymentswitch-notification:latest
          env:
            - name: ConnectionStrings__NotificationDb
              valueFrom:
                secretKeyRef:
                  name: payment-switch-secret
                  key: NotificationDb__ConnectionString
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: payment-switch-secret
                  key: Jwt__Secret
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: Jwt__Issuer
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: Jwt__Audience
            - name: RabbitMQ__HostName
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__HostName
            - name: RabbitMQ__UserName
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__UserName
            - name: RabbitMQ__Password
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__Password
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: payment-switch
spec:
  selector:
    app: notification-api
  ports:
    - port: 8080
      targetPort: 8080