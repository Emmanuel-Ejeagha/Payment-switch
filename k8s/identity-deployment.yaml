apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: payment-switch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
        - name: identity-api
          image: paymentswitch-identity:latest
          env:
            - name: ConnectionStrings__IdentityDb
              value: "Host=postgres;Database=IdentityDb;Username=paymentswitch;Password=$(POSTGRES_PASSWORD)"
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: payment-switch-secret
                  key: Jwt__Secret
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: Jwt__Issuer
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: Jwt__Audience
            - name: RabbitMQ__HostName
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__HostName
            - name: RabbitMQ__UserName
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__UserName
            - name: RabbitMQ__Password
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__Password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payment-switch-secret
                  key: Postgres__Password
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: payment-switch
spec:
  selector:
    app: identity-api
  ports:
    - port: 8080
      targetPort: 8080