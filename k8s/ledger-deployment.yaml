apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-api
  namespace: payment-switch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-api
  template:
    metadata:
      labels:
        app: ledger-api
    spec:
      containers:
        - name: ledger-api
          image: paymentswitch-ledger:latest
          env:
            - name: ConnectionStrings__LedgerDb
              valueFrom:
                secretKeyRef:
                  name: payment-switch-secret
                  key: LedgerDb__ConnectionString
            - name: Jwt__Secret
              valueFrom:
                secretKeyRef:
                  name: payment-switch-secret
                  key: Jwt__Secret
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: Jwt__Issuer
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: Jwt__Audience
            - name: RabbitMQ__HostName
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__HostName
            - name: RabbitMQ__UserName
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__UserName
            - name: RabbitMQ__Password
              valueFrom:
                configMapKeyRef:
                  name: payment-switch-config
                  key: RabbitMQ__Password
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-api
  namespace: payment-switch
spec:
  selector:
    app: ledger-api
  ports:
    - port: 8080
      targetPort: 8080