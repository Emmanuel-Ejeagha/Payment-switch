events {
    worker_connections 1024;
}

http {
    upstream identity_api {
        server identity-api:8080;
    }
    upstream merchant_api {
        server merchant-api:8080;
    }
    upstream payment_api {
        server payment-api:8080;
    }
    upstream ledger_api {
        server ledger-api:8080;
    }
    upstream notification_api {
        server notification-api:8080;
    }
    upstream settlement_api {
        server settlement-api:8080;
    }

    server {
        listen 80;

        location /identity/ {
            proxy_pass http://identity_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /merchant/ {
            proxy_pass http://merchant_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /payment/ {
            proxy_pass http://payment_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /ledger/ {
            proxy_pass http://ledger_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /notification/ {
            proxy_pass http://notification_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /settlement/ {
            proxy_pass http://settlement_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}