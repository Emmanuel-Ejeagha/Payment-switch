{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $svc.name }}
    {{- include "payment-switch.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
      containers:
        - name: {{ $svc.name }}
          image: {{ include "payment-switch.image" (dict "image" $svc.image "Chart" $.Chart "Release" $.Release "Values" $.Values.global) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.containerPort }}
          envFrom:
            - configMapRef:
                name: payment-switch-config
            - secretRef:
                name: payment-switch-secret
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ $svc.probes.livenessPath }}
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ $svc.probes.readinessPath }}
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
{{- end }}
{{- end }}
