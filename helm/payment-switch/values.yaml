namespace: payment-switch

global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""

services:
  identity:
    enabled: true
    name: identity
    replicaCount: 1
    image:
      repository: paymentswitch/identity-api
      tag: latest
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      livenessPath: /health/live
      readinessPath: /health/ready
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

  payment:
    enabled: true
    name: payment
    replicaCount: 1
    image:
      repository: paymentswitch/payment-api
      tag: latest
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      livenessPath: /health/live
      readinessPath: /health/ready
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

  merchant:
    enabled: true
    name: merchant
    replicaCount: 1
    image:
      repository: paymentswitch/merchant-api
      tag: latest
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      livenessPath: /health/live
      readinessPath: /health/ready
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

  ledger:
    enabled: true
    name: ledger
    replicaCount: 1
    image:
      repository: paymentswitch/ledger-api
      tag: latest
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      livenessPath: /health/live
      readinessPath: /health/ready
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

  notification:
    enabled: true
    name: notification
    replicaCount: 1
    image:
      repository: paymentswitch/notification-api
      tag: latest
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      livenessPath: /health/live
      readinessPath: /health/ready
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

  settlement:
    enabled: true
    name: settlement
    replicaCount: 1
    image:
      repository: paymentswitch/settlement-api
      tag: latest
    containerPort: 8080
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      livenessPath: /health/live
      readinessPath: /health/ready
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

config:
  jwt:
    issuer: "IdentityService"
    audience: "PaymentSwitch"
  rabbitmq:
    hostName: "rabbitmq"
    userName: "guest"

infrastructure:
  postgres:
    enabled: true
    image: postgres:16-alpine
    port: 5432
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 512Mi
  rabbitmq:
    enabled: true
    image: rabbitmq:3-management-alpine
    port: 5672
    managementPort: 15672
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  redis:
    enabled: false
    image: redis:7-alpine
    port: 6379
  prometheus:
    enabled: false
  grafana:
    enabled: false
  jaeger:
    enabled: false

ingress:
  enabled: false
  host: payment-switch.local
  tls:
    enabled: false
    secretName: payment-switch-tls
